add_newline = true
format = """
$directory\
$character"""
right_format = """$all"""

[directory]
truncation_length = 2

[hostname]
ssh_symbol = "´âü "
format = "[$ssh_symbol $hostname]($style) "

[git_branch]
symbol = "¯¬ä"
format =  "[$symbol $branch (:$remote_branch)]($style)"

[git_status]
style = "bold blue"
format = "[$modified$deleted$untracked$ahead_behind]($style) "
modified = "´æÖ "
deleted = "´æÿ "
untracked = "´Éá "
ahead = "´Çø "
behind = "´ÇÜ "
up_to_date = "´üØ "

[cmd_duration]
min_time = 20_000

[sudo]
style = "bold white"
format = "[$symbol]($style) "
symbol = "¯¡ô"
disabled = false

[python]
style = "bold yellow"
format = "via [${symbol} ${pyenv_prefix}(${version}) $virtualenv ]($style)"
symbol = "¾▒öÄ"
detect_extensions = []
detect_files = ["__init__.py", "requirements.txt", "pyproject.toml", "setup.py"]

[custom.docker]
style = "bold grey"
