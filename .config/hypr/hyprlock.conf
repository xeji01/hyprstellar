general = {
    disable_loading_bar = true,
    hide_cursor = true,
    ignore_empty_input = true,
    immediate_render = true
}

background {
    monitor =
    path = ~/wallpaper/wallpaper.png
    blur_passes = 2
    blur_size = 4
    brightness = 0.3
}

label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M") </big></b>"
    color = rgba(255, 255, 255, 0.8)
    font_size = 80
    font_family = Ndot55
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = Type to unlock
    color = rgba(255, 255, 255, 0.4)
    font_size = 20
    font_family = Ndot55
    position = 0, 80
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/fastfetch/kurose-tendo-circle.png
    border_color = rgba(221,221,221,0.3)
    border_size = 3
    size = 73
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = XEJI
    color = rgba(255, 255, 255, 0.5)
    font_size = 12
    font_family = Ndot55 Bold
    position = 0, -140
    halign = center
    valign = center
}

input-field {
    monitor = 
    size = 200, 50
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgba(255, 255, 255, 0.6)
    fail_color = rgba(221, 8, 8, 0.8)
    fade_on_empty = true
    fade_timeout = 200
    placeholder_text = 
    fail_text = Wrong password <b>($ATTEMPTS)</b>
    fail_transition = 300
    hide_input = false
    rounding = -1
    position = 0, -200
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(255, 255, 255, 0.3)
  font_size = 130
  font_family = Ndot55
  position = 0, -355
  halign = center
  valign = center
}

